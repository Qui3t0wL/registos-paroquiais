version: "3.9"

services:
  backend-prod:
    build: ./backend
    container_name: liber-prod
    ports:
      - "8000:8000"
    volumes:
      - ./data-prod:/data
      - ./frontend:/app/frontend:ro
    env_file: .env.prod

  backend-dev:
    build: ./backend
    container_name: liber-dev
    ports:
      - "9000:8000"
    volumes:
      - ./data-dev:/data
      - ./frontend:/app/frontend:ro
    env_file: .env.dev
