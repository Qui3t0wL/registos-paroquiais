<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liber · Registo não encontrado</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --azul-escuro:  #2B2F43;
    --azul-medio:   #4A5E76;
    --cinza:        #BDC3C2;
    --cinza-claro:  #E8EBEA;
    --branco:       #FFFFFF;
    --laranja:      #F4794A;
    --laranja-soft: #F9C4AE;
    --texto:        #1A1D2E;
    --texto-sub:    #6B7280;
    --bg:           #F6F7F9;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--texto);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    background: var(--azul-escuro);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    height: 60px;
    box-shadow: 0 1px 0 rgba(255,255,255,0.06);
  }
  .logo { display: flex; align-items: center; gap: 0.75rem; }
  .logo-icon {
    width: 32px; height: 32px;
    background: var(--laranja);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .logo-icon svg { width: 18px; height: 18px; }
  .logo-texto { font-size: 0.95rem; font-weight: 600; color: #fff; letter-spacing: -0.01em; }
  .logo-sub   { font-size: 0.7rem; font-weight: 300; color: var(--cinza); margin-top: 1px; }

  /* ── main ── */
  main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 3rem 1.5rem;
  }

  .card-erro {
    background: var(--branco);
    border: 1px solid #E5E7EB;
    border-top: 4px solid var(--laranja);
    border-radius: 10px;
    max-width: 560px;
    width: 100%;
    padding: 3rem 2.5rem 2.5rem;
    text-align: center;
    box-shadow: 0 4px 24px rgba(27,31,43,0.07);
  }

  /* ilustração SVG */
  .ilustracao {
    margin: 0 auto 2rem;
    width: 160px;
    height: 160px;
    position: relative;
  }

  /* código de erro */
  .codigo {
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--laranja);
    margin-bottom: 0.7rem;
  }

  /* título */
  .titulo {
    font-size: 1.35rem;
    font-weight: 700;
    color: var(--azul-escuro);
    line-height: 1.25;
    margin-bottom: 0.75rem;
  }

  /* subtítulo */
  .subtitulo {
    font-size: 0.88rem;
    color: var(--texto-sub);
    line-height: 1.65;
    margin-bottom: 2rem;
    font-weight: 300;
  }

  /* separador decorativo */
  .sep {
    width: 36px;
    height: 2px;
    background: var(--laranja-soft);
    border-radius: 1px;
    margin: 0 auto 1.8rem;
  }

  /* acções */
  .acoes { display: flex; gap: 0.6rem; justify-content: center; flex-wrap: wrap; }

  .btn {
    padding: 0.6rem 1.2rem;
    border-radius: 6px;
    font-family: 'Inter', sans-serif;
    font-size: 0.82rem;
    font-weight: 500;
    cursor: pointer;
    text-decoration: none;
    transition: all 0.15s;
    border: none;
    display: inline-flex;
    align-items: center;
    gap: 0.35rem;
  }
  .btn-principal {
    background: var(--azul-escuro);
    color: #fff;
  }
  .btn-principal:hover { background: var(--azul-medio); }
  .btn-secundario {
    background: transparent;
    color: var(--texto-sub);
    border: 1.5px solid #E5E7EB;
  }
  .btn-secundario:hover { border-color: var(--azul-medio); color: var(--texto); }

  /* nota de rodapé */
  .nota {
    margin-top: 2rem;
    font-size: 0.72rem;
    color: #9CA3AF;
    border-top: 1px solid var(--cinza-claro);
    padding-top: 1.2rem;
  }
  .nota code {
    font-family: monospace;
    background: var(--bg);
    padding: 0.1rem 0.4rem;
    border-radius: 3px;
    font-size: 0.68rem;
  }

  @media (max-width: 480px) {
    .card-erro { padding: 2rem 1.4rem 2rem; }
    .titulo { font-size: 1.1rem; }
    .ilustracao { width: 130px; height: 130px; }
  }
</style>
</head>
<body>

<header>
  <a href="/" style="text-decoration:none">
    <div class="logo">
      <div class="logo-icon">
        <!-- Ícone de livro simplificado -->
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M4 19V6a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v13" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/>
          <path d="M4 19a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/>
          <line x1="12" y1="4" x2="12" y2="21" stroke="#fff" stroke-width="1.4" stroke-linecap="round"/>
          <line x1="8"  y1="8" x2="11" y2="8" stroke="#fff" stroke-width="1.2" stroke-linecap="round"/>
          <line x1="8" y1="11" x2="11" y2="11" stroke="#fff" stroke-width="1.2" stroke-linecap="round"/>
          <line x1="13" y1="8" x2="16" y2="8" stroke="#fff" stroke-width="1.2" stroke-linecap="round"/>
          <line x1="13" y1="11" x2="16" y2="11" stroke="#fff" stroke-width="1.2" stroke-linecap="round"/>
        </svg>
      </div>
      <div>
        <div class="logo-texto">Liber</div>
        <div class="logo-sub">Registos Paroquiais</div>
      </div>
    </div>
  </a>
</header>

<main>
  <div class="card-erro">

    <!-- Ilustração: livro aberto com lupa e ponto de interrogação -->
    <div class="ilustracao">
      <svg viewBox="0 0 160 160" fill="none" xmlns="http://www.w3.org/2000/svg" width="160" height="160">

        <!-- Sombra suave do livro -->
        <ellipse cx="80" cy="138" rx="46" ry="7" fill="#E5E7EB" opacity="0.7"/>

        <!-- Capa do livro — lado esquerdo -->
        <rect x="22" y="32" width="52" height="96" rx="4" fill="#2B2F43"/>
        <!-- Capa do livro — lado direito -->
        <rect x="86" y="32" width="52" height="96" rx="4" fill="#4A5E76"/>
        <!-- Lombada -->
        <rect x="72" y="30" width="16" height="100" rx="4" fill="#F4794A"/>
        <!-- Páginas (efeito de profundidade) -->
        <rect x="24" y="34" width="49" height="92" rx="3" fill="#3a3f5a"/>
        <rect x="87" y="34" width="49" height="92" rx="3" fill="#5a6e84"/>

        <!-- Linhas de texto simuladas — página esquerda -->
        <line x1="33" y1="52" x2="64" y2="52" stroke="#ffffff22" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="33" y1="60" x2="64" y2="60" stroke="#ffffff22" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="33" y1="68" x2="58" y2="68" stroke="#ffffff22" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="33" y1="76" x2="64" y2="76" stroke="#ffffff22" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="33" y1="84" x2="52" y2="84" stroke="#ffffff22" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="33" y1="92" x2="64" y2="92" stroke="#ffffff22" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="33" y1="100" x2="60" y2="100" stroke="#ffffff22" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="33" y1="108" x2="64" y2="108" stroke="#ffffff22" stroke-width="2.5" stroke-linecap="round"/>

        <!-- Linhas de texto simuladas — página direita (mais claras) -->
        <line x1="96" y1="52" x2="127" y2="52" stroke="#ffffff22" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="96" y1="60" x2="127" y2="60" stroke="#ffffff22" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="96" y1="68" x2="118" y2="68" stroke="#ffffff22" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="96" y1="76" x2="127" y2="76" stroke="#ffffff22" stroke-width="2.5" stroke-linecap="round"/>

        <!-- Zona de "ausência" — página direita inferior com risco -->
        <rect x="90" y="88" width="44" height="34" rx="3" fill="#ffffff08"/>
        <!-- X a indicar ausência de registo -->
        <line x1="98" y1="96" x2="126" y2="116" stroke="#F4794A" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
        <line x1="126" y1="96" x2="98" y2="116" stroke="#F4794A" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>

        <!-- Lupa — posicionada sobre o livro -->
        <circle cx="112" cy="42" r="14" fill="#F6F7F9" stroke="#F4794A" stroke-width="3"/>
        <circle cx="112" cy="42" r="9"  fill="none"    stroke="#F4794A" stroke-width="2" opacity="0.3"/>
        <!-- cabo da lupa -->
        <line x1="122" y1="52" x2="132" y2="62" stroke="#F4794A" stroke-width="3.5" stroke-linecap="round"/>

        <!-- Ponto de interrogação dentro da lupa -->
        <text x="112" y="47" text-anchor="middle" font-family="Inter, sans-serif"
              font-size="13" font-weight="700" fill="#F4794A">?</text>
      </svg>
    </div>

    <div class="codigo">Erro 404</div>
    <h1 class="titulo">Este registo não consta<br>nos livros paroquiais.</h1>
    <div class="sep"></div>
    <p class="subtitulo">
      A página que procura não foi encontrada. Poderá ter sido removida,<br>
      o endereço alterado, ou nunca ter existido neste arquivo.
    </p>

    <div class="acoes">
      <a href="/" class="btn btn-principal">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 12L12 3l9 9"/><path d="M5 10v9a1 1 0 0 0 1 1h4v-5h4v5h4a1 1 0 0 0 1-1v-9"/></svg>
        Voltar ao arquivo
      </a>
      <a href="javascript:history.back()" class="btn btn-secundario">← Página anterior</a>
    </div>

    <div class="nota">
      Caminho solicitado: <code id="path-display">/página-não-encontrada</code>
      <script>
        document.getElementById('path-display').textContent = window.location.pathname || '/';
      </script>
    </div>

  </div>
</main>

</body>
</html>
