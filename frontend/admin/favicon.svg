<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background rounded square -->
  <rect width="32" height="32" rx="6" fill="#F4794A"/>
  <!-- Book shape -->
  <rect x="7" y="8" width="8" height="16" rx="1" fill="#2B2F43"/>
  <rect x="17" y="8" width="8" height="16" rx="1" fill="#2B2F43"/>
  <!-- Spine / binding -->
  <rect x="14.5" y="8" width="3" height="16" fill="#F4794A"/>
  <!-- Left page lines -->
  <line x1="9" y1="13" x2="13" y2="13" stroke="#F4794A" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="9" y1="16" x2="13" y2="16" stroke="#F4794A" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="9" y1="19" x2="13" y2="19" stroke="#F4794A" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Right page lines -->
  <line x1="19" y1="13" x2="23" y2="13" stroke="#F4794A" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="19" y1="16" x2="23" y2="16" stroke="#F4794A" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="19" y1="19" x2="23" y2="19" stroke="#F4794A" stroke-width="1.2" stroke-linecap="round"/>
</svg>
